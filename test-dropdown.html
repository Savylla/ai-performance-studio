<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Dropdown</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<aside class="sidebar" id="sidebar" style="display:none;"></aside>
<main class="main-content" style="margin-left:0;">
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mini"><div class="logo-icon"><i class="fas fa-bolt"></i></div><span class="logo-text">DROPDOWN TEST</span></div>
    </div>
  </header>

  <div class="tab-content active" id="tabImage">
    <div class="display-empty" id="displayEmpty">
      <div class="empty-illustration"><div class="empty-glow"></div><i class="fas fa-wand-magic-sparkles"></i></div>
      <h3>Clique nos botoes abaixo para testar o dropdown</h3>
      <p id="status" style="color: #c8ff00;">Aguardando clique...</p>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="prompt-row">
      <div class="prompt-input-wrap">
        <i class="fas fa-sparkles prompt-icon"></i>
        <textarea id="promptInput" placeholder="Teste..." rows="1"></textarea>
        <button class="prompt-btn send-btn" id="generateBtn"><i class="fas fa-arrow-up"></i></button>
      </div>
    </div>

    <div class="settings-row tab-settings active" id="settingsImage">
      <div class="setting-inline provider-selector">
        <div class="provider-pills" id="testPills">
          <div class="provider-group">
            <button class="provider-group-btn active" data-default="test-a1">
              <span class="dot free"></span> Pollinations <i class="fas fa-chevron-down"></i>
            </button>
            <div class="provider-dropdown">
              <button class="provider-drop-item active" data-provider="test-a1"><span class="dot free"></span> Flux</button>
              <button class="provider-drop-item" data-provider="test-a2"><span class="dot free"></span> Realism</button>
              <button class="provider-drop-item" data-provider="test-a3"><span class="dot free"></span> Anime</button>
            </div>
          </div>
          <div class="provider-group">
            <button class="provider-group-btn" data-default="test-b1">
              <span class="dot key"></span> Gemini <i class="fas fa-chevron-down"></i>
            </button>
            <div class="provider-dropdown">
              <button class="provider-drop-item" data-provider="test-b1"><span class="dot key"></span> 2.5 Pro</button>
              <button class="provider-drop-item" data-provider="test-b2"><span class="dot key"></span> 2.5 Flash</button>
              <button class="provider-drop-item" data-provider="test-b3"><span class="dot key"></span> 2.0 Flash</button>
              <button class="provider-drop-item" data-provider="test-b4"><span class="dot key"></span> 1.5 Pro</button>
            </div>
          </div>
          <div class="provider-group">
            <button class="provider-group-btn" data-default="test-c1">
              <span class="dot key"></span> Groq <i class="fas fa-chevron-down"></i>
            </button>
            <div class="provider-dropdown">
              <button class="provider-drop-item" data-provider="test-c1"><span class="dot key"></span> Llama 70B</button>
              <button class="provider-drop-item" data-provider="test-c2"><span class="dot key"></span> Mixtral</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ---- Inline minimal version of the dropdown system for testing ----
const statusEl = document.getElementById('status');
function log(msg) { statusEl.textContent = msg; console.log(msg); }

let activePopup = null;
let activePopupGroup = null;

function showDropdownPopup(btn, provGroup, group) {
  closeDropdownPopup();
  const dropdown = provGroup.querySelector('.provider-dropdown');
  if (!dropdown) { log('ERROR: no .provider-dropdown found'); return; }

  const popup = document.createElement('div');
  popup.className = 'dropdown-popup';
  popup.innerHTML = dropdown.innerHTML;
  document.documentElement.appendChild(popup);
  log('Popup created and appended to documentElement');

  const rect = btn.getBoundingClientRect();
  const popH = popup.offsetHeight;
  const popW = popup.offsetWidth;
  let top = rect.top - popH - 8;
  let left = rect.left + (rect.width / 2) - (popW / 2);
  if (top < 4) top = rect.bottom + 8;
  if (left < 4) left = 4;
  if (left + popW > window.innerWidth - 4) left = window.innerWidth - popW - 4;
  popup.style.cssText = 'position:fixed!important;top:' + top + 'px!important;left:' + left + 'px!important;z-index:2147483647!important;display:flex!important;flex-direction:column!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;';
  log('Popup positioned: top=' + Math.round(top) + ' left=' + Math.round(left) + ' size=' + popW + 'x' + popH);

  popup.querySelectorAll('.provider-drop-item').forEach(popItem => {
    popItem.addEventListener('click', (e) => {
      e.stopPropagation();
      const provider = popItem.dataset.provider;
      const origItem = dropdown.querySelector('[data-provider="' + provider + '"]');
      group.querySelectorAll('.provider-group-btn').forEach(b => b.classList.remove('active'));
      group.querySelectorAll('.provider-drop-item').forEach(i => i.classList.remove('active'));
      if (origItem) origItem.classList.add('active');
      btn.classList.add('active');
      btn.dataset.default = provider;
      const dotClass = btn.querySelector('.dot')?.className || 'dot key';
      const modelName = popItem.textContent.trim();
      btn.innerHTML = '<span class="' + dotClass + '"></span> ' + modelName + ' <i class="fas fa-chevron-down"></i>';
      closeDropdownPopup();
      log('Selected: ' + modelName + ' (' + provider + ')');
    });
  });

  activePopup = popup;
  activePopupGroup = provGroup;
  provGroup.classList.add('open');
  popup.addEventListener('click', (e) => e.stopPropagation());
}

function closeDropdownPopup() {
  document.querySelectorAll('.dropdown-popup').forEach(p => p.remove());
  activePopup = null;
  if (activePopupGroup) { activePopupGroup.classList.remove('open'); activePopupGroup = null; }
}

document.addEventListener('click', () => closeDropdownPopup());

// Init
const group = document.getElementById('testPills');
group.querySelectorAll('.provider-group').forEach(provGroup => {
  const groupBtn = provGroup.querySelector('.provider-group-btn');
  groupBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    log('Button clicked: ' + groupBtn.textContent.trim());
    const wasOpen = provGroup.classList.contains('open');
    closeDropdownPopup();
    if (!wasOpen) {
      showDropdownPopup(groupBtn, provGroup, group);
    }
    group.querySelectorAll('.provider-group-btn').forEach(b => b.classList.remove('active'));
    groupBtn.classList.add('active');
  });
});

log('Ready! Click Pollinations, Gemini, or Groq.');
</script>
</body>
</html>
