<!DOCTYPE html>
<html><head><title>Debug Gemini Models</title>
<style>body{background:#111;color:#eee;font-family:monospace;padding:20px}pre{background:#222;padding:10px;border-radius:8px;overflow-x:auto;max-height:400px;overflow-y:auto}button{background:#c8ff00;color:#000;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:bold;margin:4px}h3{color:#c8ff00;margin-top:20px}.ok{color:#34d399}.err{color:#ef4444}</style>
</head><body>
<h2>Debug Gemini API</h2>
<p>API Key do localStorage: <span id="keyDisplay">...</span></p>
<button onclick="listModels()">1. Listar Modelos de Imagem</button>
<button onclick="testAllModels()">2. Testar Geracao em Todos os Modelos</button>
<div id="output"></div>
<script>
const key = localStorage.getItem('gemini_api_key');
document.getElementById('keyDisplay').textContent = key ? key.substring(0,10) + '...' : 'NAO ENCONTRADA';

function log(html) {
  document.getElementById('output').innerHTML += html + '<br>';
}

async function listModels() {
  document.getElementById('output').innerHTML = '<h3>Buscando modelos...</h3>';
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}&pageSize=200`);
    const data = await res.json();
    if (data.error) { log(`<span class="err">ERRO: ${data.error.message}</span>`); return; }

    const imageModels = [];
    const allModels = [];

    for (const m of data.models || []) {
      allModels.push(m.name);
      const methods = m.supportedGenerationMethods || [];
      if (methods.includes('generateContent')) {
        // Check if name suggests image generation
        if (m.name.includes('image') || m.name.includes('banana') || m.name.includes('imagen')) {
          imageModels.push({name: m.name, methods});
        }
      }
    }

    log('<h3>Modelos que parecem gerar imagem:</h3>');
    if (imageModels.length === 0) {
      log('<span class="err">Nenhum modelo de imagem encontrado explicitamente</span>');
      log('<h3>Tentando modelos com responseModalities IMAGE...</h3>');
    }
    for (const m of imageModels) {
      log(`<span class="ok">${m.name}</span> - ${m.methods.join(', ')}`);
    }

    log('<h3>Todos os modelos disponveis:</h3>');
    log('<pre>' + allModels.join('\n') + '</pre>');
  } catch(e) {
    log(`<span class="err">Erro: ${e.message}</span>`);
  }
}

async function testAllModels() {
  document.getElementById('output').innerHTML = '<h3>Testando geracao de imagem...</h3>';

  const modelsToTest = [
    'gemini-2.5-flash-image',
    'nano-banana-pro-preview',
    'gemini-2.0-flash-exp',
    'gemini-2.5-flash',
    'gemini-2.5-flash-preview-04-17',
    'gemini-2.0-flash',
    'gemini-3-flash-preview',
    'gemini-3-pro-image-preview',
    'gemini-3.1-flash-image-preview'
  ];

  for (const model of modelsToTest) {
    log(`<br>Testando <b>${model}</b>...`);
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            contents: [{parts:[{text:'Generate an image of a cute cat in space, digital art style'}]}],
            generationConfig: {responseModalities:['IMAGE','TEXT'], temperature: 1.0}
          })
        }
      );
      const data = await res.json();

      if (data.error) {
        log(`<span class="err">  ERRO ${res.status}: ${data.error.message.substring(0,120)}</span>`);
        continue;
      }

      const parts = data.candidates?.[0]?.content?.parts || [];
      let hasImage = false;
      for (const p of parts) {
        if (p.inlineData) {
          hasImage = true;
          const src = `data:${p.inlineData.mimeType};base64,${p.inlineData.data}`;
          log(`<span class="ok">  SUCESSO! Imagem gerada!</span>`);
          log(`<img src="${src}" style="max-width:300px;border-radius:8px;margin:8px 0;">`);
        }
        if (p.text) {
          log(`  Texto: ${p.text.substring(0,100)}`);
        }
      }
      if (!hasImage) {
        log(`<span class="err">  Sem imagem na resposta. Parts: ${JSON.stringify(parts.map(p=>Object.keys(p))).substring(0,200)}</span>`);
      }
    } catch(e) {
      log(`<span class="err">  Erro: ${e.message}</span>`);
    }
  }
  log('<br><h3>Teste finalizado!</h3>');
}
</script>
</body></html>
